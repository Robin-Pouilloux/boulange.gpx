<!DOCTYPE html>
<html>
<head>
    <title>Boulangeries sur ton parcours vélo</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Feuille de style Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <!-- Librairie Leaflet -->
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <!-- Librairie pour parser les GPX -->
    <script src="https://unpkg.com/@tmcw/togeojson@5.3.0"></script>
    <script src="https://unpkg.com/gpx-js@0.3.3"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        #file-input { position: absolute; top: 10px; left: 10px; z-index: 1000; }
    </style>
</head>
<body>
    <input type="file" id="file-input" accept=".gpx" />
    <div id="map"></div>
    <script src="app.js"></script>
</body>
</html>
